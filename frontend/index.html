<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="auth-footer" style="margin-top: 20px; font-size: 14px; text-align: center;">
            <p style="color: #64748b;">Don't have an account?
                <a href="register.html" style="color: #00cec9; text-decoration: none; font-weight: 600;">Register
                    here</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>


<script>
  // Base API URL
  const API = "http://127.0.0.1:5000/api";

  // ---------------- REGISTER ----------------
  async function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API}/register`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({name, email, password})
    });
    const data = await res.json();
    alert(data.message);
  }

  // ---------------- LOGIN ----------------
  async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch(`${API}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      credentials: "include",
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    alert(data.message);
  }

  // ---------------- LOGOUT ----------------
  async function logout() {
    const res = await fetch(`${API}/logout`, {
      method: "POST",
      credentials: "include"
    });
    const data = await res.json();
    alert(data.message);
  }

  // ---------------- PROFILE ----------------
  async function getProfile() {
    const res = await fetch(`${API}/profile`, {
      method: "GET",
      credentials: "include"
    });
    const data = await res.json();
    alert(JSON.stringify(data));
  }

  async function updateProfile() {
    const name = document.getElementById("updateName").value;
    const email = document.getElementById("updateEmail").value;

    const res = await fetch(`${API}/profile/update`, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      credentials: "include",
      body: JSON.stringify({name, email})
    });
    const data = await res.json();
    alert(data.message);
  }

  // ---------------- PAYMENT ----------------
  async function createOrder() {
    const amount = parseInt(document.getElementById("amount").value);

    const res = await fetch(`${API}/create-order`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      credentials: "include",
      body: JSON.stringify({amount})
    });
    const data = await res.json();
    alert(JSON.stringify(data));
  }

  async function paymentHistory() {
    const res = await fetch(`${API}/payment-history`, {
      method: "GET",
      credentials: "include"
    });
    const data = await res.json();
    alert(JSON.stringify(data));
  }
</script>

</html>
