<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - Payment App</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h2>Create Account</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
            <div class="auth-footer" style="margin-top: 20px; font-size: 14px; text-align: center;">
                <p style="color: #64748b;">Already have an account?
                    <a href="index.html" style="color: #00cec9; text-decoration: none; font-weight: 600;">Login here</a>
                </p>
            </div>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
